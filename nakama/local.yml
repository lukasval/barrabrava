# Nakama server config for BarraBrava.
# Used inside the heroiclabs/nakama container — env vars are interpolated at startup.

name: barrabrava-nakama
data_dir: "./data"

logger:
  level: "INFO"

session:
  encryption_key: "${NAKAMA_SESSION_ENCRYPTION_KEY}"
  refresh_encryption_key: "${NAKAMA_SESSION_REFRESH_ENCRYPTION_KEY}"
  token_expiry_sec: 3600
  refresh_token_expiry_sec: 2592000

socket:
  server_key: "${NAKAMA_SERVER_KEY}"

runtime:
  js_entrypoint: "build/index.js"
  # runtime.env intentionally OMITTED here.
  #
  # Nakama's server/config.go convertRuntimeEnv reads runtime.env entries as
  # LITERAL strings — no ${VAR} expansion happens. So configuring env vars
  # here would put the literal "${ADMIN_TEST_MODE}" into ctx.env instead of
  # the value of the container env var.
  #
  # Instead, the docker/nakama-entrypoint.sh wrapper enumerates a known list
  # of container env vars and appends them as --runtime.env=KEY=VALUE CLI
  # flags to the Nakama process at boot. CLI flags ARE expanded by the shell
  # before reaching Nakama, so the real values land in ctx.env. This is the
  # canonical Heroic Labs pattern for runtime env injection in cloud deploys.
  #
  # To add a new env var: edit RUNTIME_ENV_VARS in docker/nakama-entrypoint.sh.

# Rate limits — baseline TEC-10. Mitigates T-1-RT-05, T-1-RT-06.
limit:
  registration_per_ip_per_min: 10
  rpc_per_user_per_min: 60
