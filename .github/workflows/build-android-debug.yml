name: Android Debug Build

# DEFERRED to Phase 7 (see .planning/phases/01-foundation/DEFERRED-CI.md).
# Triggers reduced to workflow_dispatch only so red builds don't clutter the
# Actions tab during Phase 1-6. Godot project compiles correctly locally; CI
# blocker is a Godot 4.3 + barichello/godot-ci:4.3 image interaction around
# Android target_sdk vs build-tools 33.0.2 that emits empty "configuration
# errors:" list. Will be revisited in Phase 7 (Polish + Soft Launch) when iOS
# CI is also re-enabled.

on:
  workflow_dispatch:

jobs:
  export-android-debug:
    name: Android Debug Export
    runs-on: ubuntu-22.04
    container:
      image: barichello/godot-ci:4.3
    env:
      HOME: /root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Import project (pre-heat)
        run: godot --headless --editor --quit || true

      - name: Export APK (debug)
        run: |
          mkdir -p build/android
          godot --headless --verbose \
            --export-debug "Android Debug" \
            "build/android/BarraBrava-debug.apk"

      - name: Verify APK exists
        run: |
          test -f build/android/BarraBrava-debug.apk
          ls -lh build/android/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/android/BarraBrava-debug.apk
          retention-days: 7
