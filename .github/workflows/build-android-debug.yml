name: Android Debug Build

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  export-android-debug:
    name: Android Debug Export
    runs-on: ubuntu-22.04
    container:
      image: barichello/godot-ci:4.3
    env:
      HOME: /root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify setup
        run: |
          echo "HOME=$HOME"
          ls -la /root/.config/godot/ 2>&1 | head -10
          ls -la /root/.local/share/godot/export_templates/4.3.stable/android_debug.apk
          echo "=== android paths in baked editor_settings ==="
          (cat /root/.config/godot/editor_settings-4.tres 2>/dev/null || cat /root/.config/godot/editor_settings-4.3.tres 2>/dev/null) | grep -E "java_sdk|android_sdk|debug_keystore" || echo "no baked android paths"

      - name: Import project (pre-heat)
        run: godot --headless --editor --quit || true

      - name: Export APK (debug)
        run: |
          mkdir -p build/android
          godot --headless --verbose \
            --export-debug "Android Debug" \
            "build/android/BarraBrava-debug.apk"

      - name: Verify APK exists
        run: |
          test -f build/android/BarraBrava-debug.apk
          ls -lh build/android/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/android/BarraBrava-debug.apk
          retention-days: 7
