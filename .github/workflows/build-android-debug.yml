name: Android Debug Build

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  export-android-debug:
    name: Android Debug Export
    runs-on: ubuntu-22.04
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates + editor settings
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mkdir -p ~/.config/godot/
          mv /root/.local/share/godot/export_templates/4.3.stable \
             ~/.local/share/godot/export_templates/4.3.stable
          # Write editor_settings with Android JDK + SDK + debug keystore paths.
          # HOME=/github/home in GH Actions container (not /root), so pre-heat
          # generates a fresh editor_settings WITHOUT the barichello-baked Android
          # paths. We inject minimal required fields here so headless export can
          # find java_sdk, android_sdk, and debug_keystore.
          cat > ~/.config/godot/editor_settings-4.tres <<'EOF'
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"
          export/android/android_sdk_path = "/usr/lib/android-sdk"
          export/android/debug_keystore = "/root/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Import project (pre-heat)
        run: godot --headless --editor --quit || true

      - name: Export APK (debug)
        run: |
          mkdir -p build/android
          godot --headless --verbose \
            --export-debug "Android Debug" \
            "build/android/BarraBrava-debug.apk"

      - name: Verify APK exists
        run: |
          test -f build/android/BarraBrava-debug.apk
          ls -lh build/android/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/android/BarraBrava-debug.apk
          retention-days: 7
